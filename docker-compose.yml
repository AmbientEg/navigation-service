# Lean Compose base file.
# - Runtime service only
# - External Neon PostgreSQL via DATABASE_URL
# - Local development customizations live in docker-compose.override.yml

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        APP_USER: appuser
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    image: navigation-service:prod
    container_name: navigation-api
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

