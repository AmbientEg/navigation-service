# Lean CI Compose.
# - Runs tests against external Neon test database
# - Optional lint step

services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      DATABASE_URL: ${TEST_DATABASE_URL:?TEST_DATABASE_URL is required}
      ENVIRONMENT: test
      PYTHONDONTWRITEBYTECODE: 1
    command: pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term

  lint:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app:ro
    command: >
      sh -c "
        pip install -q flake8 pylint &&
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=nav-service &&
        pylint . --disable=C,R --exit-zero
      "
